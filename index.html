<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite Master</title>

    <!-- ── Splash screen styles (inlined so they load BEFORE any JS) ── -->
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background:
          radial-gradient(circle at top left, rgba(34, 211, 238, 0.12), transparent 30rem),
          radial-gradient(circle at top right, rgba(34, 197, 94, 0.12), transparent 24rem),
          linear-gradient(180deg, #020617 0%, #06111f 42%, #0f172a 100%);
        transition: opacity 0.45s ease, visibility 0.45s ease;
      }

      #splash.hide {
        opacity: 0;
        visibility: hidden;
      }

      #splash-logo {
        width: 56px;
        height: 56px;
        animation: splash-pulse 1.8s ease-in-out infinite;
      }

      #splash-title {
        font-family: 'Space Grotesk', 'DM Sans', system-ui, sans-serif;
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #f1f5f9;
      }

      #splash-spinner {
        width: 28px;
        height: 28px;
        border: 2.5px solid rgba(148, 163, 184, 0.2);
        border-top-color: #22d3ee;
        border-radius: 50%;
        animation: splash-spin 0.75s linear infinite;
      }

      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }

      @keyframes splash-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(0.96); }
      }
    </style>
  </head>
  <body>
    <!-- ── Splash screen (raw HTML, renders instantly) ─────────────── -->
    <div id="splash">
      <img id="splash-logo" src="/favicon.svg" alt="" />
      <span id="splash-title">Vite Master</span>
      <div id="splash-spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
